<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - DomainNest</title>
<style>
body { font-family: 'Segoe UI', sans-serif; background:#f9f9f9; color:#333; display:flex; justify-content:center; align-items:center; height:100vh; }
.container { background:#fff; padding:40px; border-radius:10px; box-shadow:0 0 15px rgba(0,0,0,0.1); width:300px; text-align:center; }
input { width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #ccc; }
button { padding:10px 20px; background:#22c55e; color:#fff; border:none; border-radius:5px; cursor:pointer; }
button:hover { background:#16a34a; }
a { display:block; margin-top:10px; color:#2563eb; text-decoration:none; }
</style>
</head>
<body>

<div class="form-box">
<h2>Sign Up</h2>
<input type="email" id="email" placeholder="Email" required />
<input type="password" id="password" placeholder="Password" required />
<button id="signupBtn">Sign Up</button>
<a href="login.html">Already have an account? Login</a>
<div id="message" style="margin-top:10px; color:red;"></div>
</div>

<script>
document.getElementById('signupBtn').onclick = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const messageDiv = document.getElementById('message');

    if (!email || !password) return messageDiv.innerText = "Please enter all fields";

    try {
        const res = await fetch('/signup', {
            method: 'POST',
            headers: { 'Content-Type':'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if(data.token){
            localStorage.setItem('token', data.token);
            window.location.href = '/'; // go to dashboard
        } else {
            messageDiv.innerText = data.error || "Sign up failed, try again";
        }
    } catch(err){
        messageDiv.innerText = "Sign up failed, check your network";
    }
};
</script>

</body>
</html>
