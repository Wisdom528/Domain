<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup - DomainNest</title>
<style>
body {
    font-family: Arial;
    background: #0b0f1a;
    color: white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.form-box {
    background:#1e293b;
    padding:30px;
    border-radius:10px;
    width:300px;
    text-align:center;
}
input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:5px;
}
button {
    width:100%;
    padding:10px;
    background:#22c55e;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
a { color:#38bdf8; }
</style>
</head>
<body>

<div class="form-box">
    <h2>Signup</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="signup()">Create Account</button>
    <p>Already have an account? <a href="login.html">Login</a></p>
</div>

<script src="auth.js"></script>
</body>
</html>
