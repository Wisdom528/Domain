<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DomainNest Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  /* Reset & Fonts */
  * {margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif;}
  body {background:#f9f9f9; color:#111; line-height:1.5;}
  a {text-decoration:none; color:inherit;}
  button {cursor:pointer; transition:0.3s; border:none; border-radius:6px;}
  
  /* Header */
  header {display:flex; justify-content:space-between; align-items:center; padding:20px 40px; background:#fff; box-shadow:0 2px 8px rgba(0,0,0,0.1);}
  header h1 {color:#1d4ed8; font-size:1.8rem;}
  nav button {margin-left:10px; padding:8px 16px; font-weight:600; background:#1d4ed8; color:#fff;}
  nav button:hover {background:#2563eb;}

  /* Hero / Dashboard */
  .hero {padding:40px 20px; text-align:center;}
  .hero h2 {font-size:2rem; margin-bottom:10px; color:#111;}
  .hero p {margin-bottom:25px; color:#4b5563;}
  
  /* Search Box */
  .search-box {display:flex; justify-content:center; margin-bottom:20px;}
  .search-box input {padding:10px 15px; width:250px; border:1px solid #d1d5db; border-radius:6px 0 0 6px; outline:none;}
  .search-box button {padding:10px 20px; background:#1d4ed8; color:#fff; font-weight:600; border-radius:0 6px 6px 0;}
  .search-box button:hover {background:#2563eb;}

  /* Auth Message */
  .auth-message {text-align:center; margin-bottom:20px; color:#111; font-weight:600;}

  /* Domain Results */
  .result {max-width:800px; margin:0 auto;}
  .card {background:#fff; padding:15px 20px; border-radius:8px; margin:10px 0; box-shadow:0 2px 6px rgba(0,0,0,0.05);}
  .crypto-options {margin-top:10px; display:flex; gap:10px; flex-wrap:wrap;}
  .crypto-options button {display:flex; align-items:center; gap:6px; padding:6px 12px; background:#111; color:#fff;}
  .crypto-logo {width:18px; height:18px;}

  /* Dashboard */
  #dashboard {max-width:900px; margin:20px auto; display:none;}
  #dashboard h3 {margin-bottom:10px; color:#111;}

  /* Footer */
  footer {text-align:center; padding:20px; color:#6b7280; font-size:0.9rem; margin-top:50px;}
  
  /* Responsive */
  @media(max-width:600px){
    .search-box {flex-direction:column;}
    .search-box input, .search-box button {width:100%; border-radius:6px; margin-bottom:10px;}
    .crypto-options {justify-content:center;}
  }
</style>
</head>
<body>

<header>
  <h1>DomainNest</h1>
  <nav>
    <button id="loginBtn">Login</button>
    <button id="signupBtn">Signup</button>
    <button id="logoutBtn" style="display:none;">Logout</button>
  </nav>
</header>

<section class="hero">
  <h2>Welcome to Your Dashboard</h2>
  <p>Search and buy domains instantly with crypto payments.</p>

  <div class="auth-message" id="authMessage"></div>

  <div class="search-box">
    <input type="text" id="domainInput" placeholder="Enter your domain name..."/>
    <button onclick="checkDomain()">Search</button>
  </div>

  <div class="result" id="result"></div>
</section>

<section class="dashboard" id="dashboard">
  <h3>Your Domains:</h3>
  <div id="userDomains"></div>
</section>

<footer>
  © 2026 DomainNest. All rights reserved.
</footer>

<script src="index.js"></script>
</body>
</html>
